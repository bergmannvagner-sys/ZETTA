services:
  postgres:
    image: postgres:16-alpine
    container_name: bergmann-postgres
    environment:
      POSTGRES_DB: bergmann
      POSTGRES_USER: bergmann
      POSTGRES_PASSWORD: bergmann
    ports:
      - "5432:5432"
    volumes:
      - bergmann-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bergmann -d bergmann"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bergmann-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bergmann-postgres:
