services:
  - type: web
    name: zetta-bergmann
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zetta-bergmann-postgres-mvp
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: zetta-bergmann-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_TEMPERATURE
        value: "0.7"
      - key: AI_TIMEOUT_SECONDS
        value: "30"
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_BOOTSTRAP_ON_STARTUP
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: PASSWORD_RESET_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: BILLING_WEBHOOKS_ENABLED
        value: "false"
      - key: BILLING_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: MERCADO_PAGO_SANDBOX_MODE
        value: "true"
      - key: MERCADO_PAGO_SUCCESS_URL
        sync: false
      - key: MERCADO_PAGO_FAILURE_URL
        sync: false
      - key: MERCADO_PAGO_PENDING_URL
        sync: false

  - type: redis
    name: zetta-bergmann-redis
    plan: free
    ipAllowList: []

databases:
  - name: zetta-bergmann-postgres-mvp
    databaseName: bergmann
    user: bergmann
    plan: free
